fwd_time: 1000
bwd_time: 1000
wgrad_time: 1000

print_simulation_result: true
output_dir: ./pp_simulation_result

schedulers:
  - name: basic_1f1b
    class: primuspipe.scheduler.algorithms.basic_1f1b.Schedule1F1B
    pp_size: 4
    vpp_size: 1
    micro_batches: 16

  - name: zerobubble
    class: primuspipe.scheduler.algorithms.zerobubble.ScheduleZeroBubble
    pp_size: 4
    vpp_size: 1
    micro_batches: 16

  - name: interleaved_1f1b
    class: primuspipe.scheduler.algorithms.interleaved_1f1b.ScheduleInterleaved1F1B
    pp_size: 4
    vpp_size: 2
    micro_batches: 16

  - name: zbv-formatted
    class: primuspipe.scheduler.algorithms.zbv_formatted.ScheduleZBVFormatted
    pp_size: 4
    vpp_size: 2
    micro_batches: 16

  - name: v-half
    class: primuspipe.scheduler.algorithms.zbv_greedy.ScheduleZBVGreedy
    pp_size: 4
    vpp_size: 2
    micro_batches: 16
    memory_config: half

  - name: v-min
    class: primuspipe.scheduler.algorithms.zbv_greedy.ScheduleZBVGreedy
    pp_size: 4
    vpp_size: 2
    micro_batches: 16
    memory_config: min
